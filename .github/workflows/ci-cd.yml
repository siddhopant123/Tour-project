name: CI-CD with ArgoCD

on:
push:
branches:
- main

env:
IMAGE_NAME: Tour-service

jobs:
build-push-update:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout Code
    uses: actions/checkout@v3

  - name: Generate Image Tag
    run: echo "TAG=$(date +%s)" >> $GITHUB_ENV

  - name: Login to DockerHub
    run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

  - name: Build Docker Image
    run: |
      docker build -t ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:$TAG .

  - name: Push Docker Image
    run: |
      docker push ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:$TAG

  # 🔥 Update Kubernetes YAML
  - name: Update Deployment YAML
    run: |
      sed -i "s|image:.*|image: ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:$TAG|g" k8s/deployment.yaml

  - name: Commit and Push Changes
    run: |
      git config --global user.name "github-actions"
      git config --global user.email "actions@github.com"
      git add k8s/deployment.yaml
      git commit -m "Update image to $TAG" || echo "No changes"
      git push
```
